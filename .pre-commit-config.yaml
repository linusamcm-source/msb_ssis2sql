repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-xml
    -   id: check-toml
    -   id: check-added-large-files
    -   id: check-case-conflict
    -   id: check-merge-conflict
    -   id: check-symlinks
    -   id: check-json
    -   id: check-docstring-first
    -   id: check-executables-have-shebangs
    -   id: check-ast
    -   id: check-byte-order-marker
    -   id: check-added-large-files
    -   id: debug-statements
    -   id: double-quote-string-fixer
    -   id: name-tests-test
    -   id: sort-simple-yaml
    -   id: detect-aws-credentials
    -   id: requirements-txt-fixer
    -   id: check-illegal-windows-names
-   repo: local
    hooks:
    -   id: forbid-env-at-root
        name: Reject committing .env at repo root
        entry: bash -c 'for f in "$@"; do case "$f" in .env) echo "refusing to commit .env at repo root"; exit 1;; esac; done' --
        language: system
        files: '^\.env$'
        pass_filenames: true
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.13
    hooks:
        # Run the linter.
    -   id: ruff-check
        args: [ --fix . ]
        # Run the formatter.
    -   id: ruff-format